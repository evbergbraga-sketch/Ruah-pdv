version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pdv_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-pdv}
      POSTGRES_USER:     ${POSTGRES_USER:-pdv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?obrigatório}
    volumes:
      - pdv_db_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER:-pdv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-production}
    container_name: pdv_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pdv}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pdv}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 8010
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:8010/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-production}
    container_name: pdv_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL:          http://localhost:8010
      VITE_SUPABASE_URL:     ${SUPABASE_URL:-}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    ports:
      - "3010:3000"

volumes:
  pdv_db_data:
    name: pdv_db_data
